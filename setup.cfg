[mutmut]
# Mutation testing for the benchmark's measurement tooling. Defaults to the
# CI-critical scorer; point it at another module to mutate that one instead:
#   build_dashboard: paths_to_mutate=.claude/skills/results-dashboard/scripts/build_dashboard.py
#                    runner=python -m pytest -x -q .claude/skills/results-dashboard/tests/
#   aggregator:      paths_to_mutate=scripts/aggregate_results.py
#                    runner=python -m pytest -x -q tests/test_aggregate_results.py
paths_to_mutate=scripts/score_quality.py
runner=python -m pytest -x -q tests/test_score_quality.py
tests_dir=tests/
